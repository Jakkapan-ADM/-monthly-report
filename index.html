<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกกำไร/ขาดทุนประจำวัน</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

  /* ── Light theme ── */
  :root, [data-theme="light"] {
    --bg:         #f5f6fa;
    --surface:    #ffffff;
    --surface2:   #f0f1f7;
    --border:     #dde0ec;
    --profit:     #1a9e6e;
    --profit-dim: #1a9e6e14;
    --loss:       #d94f5c;
    --loss-dim:   #d94f5c12;
    --neutral:    #8890a8;
    --text:       #1e2235;
    --text-dim:   #6b7390;
    --accent:     #3b60e8;
    --accent-dim: #3b60e812;
    --today-bg:   #3b60e810;
    --selected:   #3b60e828;
    --shadow:     0 1px 4px rgba(0,0,0,0.07);
  }

  /* ── Dark theme ── */
  [data-theme="dark"] {
    --bg:         #14161f;
    --surface:    #1d2030;
    --surface2:   #252840;
    --border:     #333858;
    --profit:     #2ec99a;
    --profit-dim: #2ec99a14;
    --loss:       #f0606e;
    --loss-dim:   #f0606e12;
    --neutral:    #8890b8;
    --text:       #d8ddf0;
    --text-dim:   #8890b8;
    --accent:     #6b8fff;
    --accent-dim: #6b8fff14;
    --today-bg:   #6b8fff18;
    --selected:   #6b8fff30;
    --shadow:     0 1px 6px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    padding: 20px;
    transition: background 0.25s, color 0.25s;
  }

  /* ── Header ── */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .app-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text);
  }
  .app-title span { color: var(--accent); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  /* ── Theme toggle ── */
  .theme-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    cursor: pointer;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Nav ── */
  .nav-bar {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    width: 34px; height: 34px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s;
    box-shadow: var(--shadow);
  }
  .nav-btn:hover { border-color: var(--accent); background: var(--accent-dim); }

  .month-label {
    font-size: 1rem;
    font-weight: 700;
    min-width: 150px;
    text-align: center;
    color: var(--text);
  }

  /* ── Summary bar ── */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    box-shadow: var(--shadow);
  }

  .summary-card .lbl {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 5px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .summary-card .val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.2rem;
    font-weight: 700;
    line-height: 1;
  }

  .profit-card .val { color: var(--profit); }
  .loss-card   .val { color: var(--loss); }
  .net-card    .val.pos  { color: var(--profit); }
  .net-card    .val.neg  { color: var(--loss); }
  .net-card    .val.zero { color: var(--neutral); }
  .days-card   .val { color: var(--accent); }

  /* ── Calendar ── */
  .calendar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }

  .cal-head {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .cal-head-cell {
    text-align: center;
    padding: 10px 4px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.4px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .cal-head-cell:first-child { color: var(--loss); }
  .cal-head-cell:last-child  { color: var(--accent); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .cal-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    min-height: 86px;
    padding: 7px;
    cursor: pointer;
    transition: background 0.12s;
    display: flex;
    flex-direction: column;
  }

  .cal-cell:nth-child(7n)  { border-right: none; }
  .cal-cell:hover          { background: var(--accent-dim); }
  .cal-cell.empty          { cursor: default; background: transparent !important; opacity: 0.3; }
  .cal-cell.today          { background: var(--today-bg); }
  .cal-cell.selected       { background: var(--selected) !important; outline: 2px solid var(--accent); outline-offset: -2px; }
  .cal-cell.has-profit     { background: var(--profit-dim); }
  .cal-cell.has-loss       { background: var(--loss-dim); }

  .day-num {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--text-dim);
    line-height: 1;
    margin-bottom: 3px;
    width: 24px; height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }

  .cal-cell.today  .day-num { background: var(--accent); color: #fff; }
  .day-sunday  .day-num { color: var(--loss); }
  .day-saturday .day-num { color: var(--accent); }

  .day-note {
    font-size: 0.65rem;
    color: var(--text-dim);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    line-height: 1.35;
    margin-top: 2px;
    flex: 1;
  }

  .day-amount {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.78rem;
    font-weight: 700;
    margin-top: auto;
    padding-top: 2px;
  }
  .day-amount.pos { color: var(--profit); }
  .day-amount.neg { color: var(--loss); }

  /* ── Entry panel ── */
  .entry-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
    display: none;
    box-shadow: var(--shadow);
  }
  .entry-panel.open { display: block; }

  .entry-title {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text-dim);
  }
  .entry-title strong { color: var(--text); }

  .entry-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .field label {
    display: block;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text-dim);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .field input, .field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field textarea:focus { border-color: var(--accent); }
  .field textarea {
    font-family: 'Sarabun', sans-serif;
    font-size: 0.9rem;
    resize: none;
    height: 62px;
  }

  .entry-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 9px 18px;
    border-radius: 7px;
    border: none;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-save   { background: var(--accent); color: #fff; }
  .btn-delete { background: transparent; border: 1.5px solid var(--loss); color: var(--loss); }
  .btn-close  { background: transparent; border: 1.5px solid var(--border); color: var(--text-dim); margin-left: auto; }
  .btn:hover  { opacity: 0.82; }

  /* ── Report ── */
  .report-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .report-header {
    background: var(--surface2);
    padding: 13px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .report-header h2 {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
  }

  .btn-print {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: 'Sarabun', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
  }
  .btn-print:hover { opacity: 0.85; }

  .report-table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead th {
    background: var(--surface2);
    color: var(--text-dim);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: var(--surface2); }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 10px 14px;
    font-size: 0.88rem;
    color: var(--text);
    vertical-align: top;
  }
  td.mono { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; }
  td.pos  { font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem; font-weight: 700; color: var(--profit); }
  td.neg  { font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem; font-weight: 700; color: var(--loss); }

  .report-foot td {
    background: var(--surface2);
    font-weight: 700;
    font-size: 0.92rem;
    border-top: 2px solid var(--border) !important;
  }
  .report-foot td.pos { font-family: 'IBM Plex Mono', monospace; color: var(--profit); }
  .report-foot td.neg { font-family: 'IBM Plex Mono', monospace; color: var(--loss); }

  .empty-report {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 20px;
    font-size: 0.88rem;
  }

  /* ── Print ── */
  @media print {
    body { background: #fff; color: #000; padding: 0; }
    .app-header, .entry-panel, .calendar-wrap, .btn-print, .theme-btn { display: none !important; }
    .summary-bar { display: grid !important; }
    .summary-card { border: 1px solid #ccc; }
    .summary-card .val, .summary-card .lbl { color: #000 !important; }
    .report-section { border: 1px solid #ccc; }
    thead th, .report-foot td { background: #f4f4f4 !important; }
    td, th { border: 1px solid #ddd; }
  }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .entry-row { grid-template-columns: 1fr; }
    .cal-cell { min-height: 60px; padding: 4px; }
    .day-note { display: none; }
    .summary-bar { grid-template-columns: 1fr 1fr; }
    .summary-card .val { font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">📊 บันทึก<span>กำไร/ขาดทุน</span></div>
  <div class="header-right">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>
    <div class="nav-bar">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>
</div>

<!-- Summary -->
<div class="summary-bar">
  <div class="summary-card profit-card">
    <div class="lbl">กำไรรวม</div>
    <div class="val" id="sumProfit">฿0.00</div>
  </div>
  <div class="summary-card loss-card">
    <div class="lbl">ขาดทุนรวม</div>
    <div class="val" id="sumLoss">฿0.00</div>
  </div>
  <div class="summary-card net-card">
    <div class="lbl">สุทธิ</div>
    <div class="val zero" id="sumNet">฿0.00</div>
  </div>
  <div class="summary-card days-card">
    <div class="lbl">วันที่บันทึก</div>
    <div class="val" id="sumDays">0 วัน</div>
  </div>
</div>

<!-- Calendar -->
<div class="calendar-wrap">
  <div class="cal-head">
    <div class="cal-head-cell">อา</div>
    <div class="cal-head-cell">จ</div>
    <div class="cal-head-cell">อ</div>
    <div class="cal-head-cell">พ</div>
    <div class="cal-head-cell">พฤ</div>
    <div class="cal-head-cell">ศ</div>
    <div class="cal-head-cell">ส</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- Entry Panel -->
<div class="entry-panel" id="entryPanel">
  <div class="entry-title">✏️ บันทึกวันที่ <strong id="entryDateLabel"></strong></div>
  <div class="entry-row">
    <div class="field">
      <label>กำไร (บาท)</label>
      <input type="number" id="inputProfit" placeholder="0.00" min="0" step="0.01">
    </div>
    <div class="field">
      <label>ขาดทุน (บาท)</label>
      <input type="number" id="inputLoss" placeholder="0.00" min="0" step="0.01">
    </div>
  </div>
  <div class="field" style="margin-bottom:14px">
    <label>หมายเหตุ</label>
    <textarea id="inputNote" placeholder="เพิ่มหมายเหตุ..."></textarea>
  </div>
  <div class="entry-actions">
    <button class="btn btn-save" onclick="saveEntry()">💾 บันทึก</button>
    <button class="btn btn-delete" onclick="deleteEntry()">🗑 ลบ</button>
    <button class="btn btn-close" onclick="closePanel()">✕ ปิด</button>
  </div>
</div>

<!-- Report -->
<div class="report-section">
  <div class="report-header">
    <h2 id="reportTitle">รายงานประจำเดือน</h2>
    <button class="btn-print" onclick="window.print()">🖨️ พิมพ์</button>
  </div>
  <div class="report-table-wrap">
    <div id="reportBody"></div>
  </div>
</div>

<script>
  const MONTHS_TH = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
                     'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const DAYS_TH   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];

  let today       = new Date();
  let curYear     = today.getFullYear();
  let curMonth    = today.getMonth();
  let selectedKey = null;

  // ── Theme ─────────────────────────────────────────────────────
  function initTheme() {
    const saved = localStorage.getItem('plcal_theme') || 'light';
    setTheme(saved);
  }

  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('plcal_theme', t);
    const btn = document.getElementById('themeBtn');
    btn.textContent = t === 'dark' ? '☀️ Light' : '🌙 Dark';
  }

  function toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    setTheme(cur === 'dark' ? 'light' : 'dark');
  }

  // ── Storage ───────────────────────────────────────────────────
  function storeKey(y, m) { return `plcal_${y}_${m}`; }
  function loadData(y, m) {
    try { return JSON.parse(localStorage.getItem(storeKey(y, m))) || {}; }
    catch { return {}; }
  }
  function saveData(y, m, d) {
    localStorage.setItem(storeKey(y, m), JSON.stringify(d));
  }

  // ── Format ────────────────────────────────────────────────────
  function fmt(n) {
    return '฿' + Math.abs(n).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // ── Render ────────────────────────────────────────────────────
  function render() {
    const data = loadData(curYear, curMonth);

    document.getElementById('monthLabel').textContent =
      `${MONTHS_TH[curMonth]} ${curYear + 543}`;
    document.getElementById('reportTitle').textContent =
      `รายงานประจำเดือน${MONTHS_TH[curMonth]} ${curYear + 543}`;

    let totalProfit = 0, totalLoss = 0, days = 0;
    Object.values(data).forEach(d => {
      if (d.profit || d.loss) days++;
      totalProfit += parseFloat(d.profit || 0);
      totalLoss   += parseFloat(d.loss   || 0);
    });
    const net = totalProfit - totalLoss;

    document.getElementById('sumProfit').textContent = fmt(totalProfit);
    document.getElementById('sumLoss').textContent   = fmt(totalLoss);

    const netEl = document.getElementById('sumNet');
    netEl.textContent = (net >= 0 ? '+' : '-') + fmt(net);
    netEl.className   = 'val ' + (net > 0 ? 'pos' : net < 0 ? 'neg' : 'zero');
    document.getElementById('sumDays').textContent = `${days} วัน`;

    // Calendar cells
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    const firstDay    = new Date(curYear, curMonth, 1).getDay();
    const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
      const c = document.createElement('div');
      c.className = 'cal-cell empty';
      grid.appendChild(c);
    }

    for (let d = 1; d <= daysInMonth; d++) {
      const key   = `${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const entry = data[key] || {};
      const p     = parseFloat(entry.profit || 0);
      const l     = parseFloat(entry.loss   || 0);
      const dow   = new Date(curYear, curMonth, d).getDay();
      const isToday = curYear === today.getFullYear() && curMonth === today.getMonth() && d === today.getDate();

      let cls = 'cal-cell';
      if (dow === 0) cls += ' day-sunday';
      if (dow === 6) cls += ' day-saturday';
      if (isToday)   cls += ' today';
      if (p > 0 && l === 0) cls += ' has-profit';
      if (l > 0 && p === 0) cls += ' has-loss';
      if (key === selectedKey) cls += ' selected';

      const cell = document.createElement('div');
      cell.className = cls;
      cell.onclick = () => openEntry(key, d);

      const dn = document.createElement('div');
      dn.className = 'day-num';
      dn.textContent = d;
      cell.appendChild(dn);

      if (entry.note) {
        const note = document.createElement('div');
        note.className = 'day-note';
        note.textContent = entry.note;
        cell.appendChild(note);
      }

      if (p !== 0 || l !== 0) {
        const net2 = p - l;
        const amt  = document.createElement('div');
        amt.className   = 'day-amount ' + (net2 >= 0 ? 'pos' : 'neg');
        amt.textContent = (net2 >= 0 ? '+' : '-') + fmt(net2);
        cell.appendChild(amt);
      }

      grid.appendChild(cell);
    }

    renderReport(data);
  }

  // ── Report ────────────────────────────────────────────────────
  function renderReport(data) {
    const entries = Object.entries(data)
      .filter(([, v]) => v.profit || v.loss || v.note)
      .sort(([a], [b]) => a < b ? -1 : 1);

    const wrap = document.getElementById('reportBody');
    if (!entries.length) {
      wrap.innerHTML = '<div class="empty-report">ยังไม่มีข้อมูลในเดือนนี้<br><small>คลิกที่วันในปฏิทินเพื่อเริ่มบันทึก</small></div>';
      return;
    }

    let tP = 0, tL = 0, rows = '';
    entries.forEach(([key, v]) => {
      const p   = parseFloat(v.profit || 0);
      const l   = parseFloat(v.loss   || 0);
      const net = p - l;
      tP += p; tL += l;
      const [,, dd] = key.split('-');
      const dow = new Date(key).getDay();
      rows += `<tr>
        <td class="mono">${parseInt(dd)} ${MONTHS_TH[curMonth]}</td>
        <td>${DAYS_TH[dow]}</td>
        <td class="${p > 0 ? 'pos' : 'mono'}">${p > 0 ? fmt(p) : '—'}</td>
        <td class="${l > 0 ? 'neg' : 'mono'}">${l > 0 ? fmt(l) : '—'}</td>
        <td class="${net >= 0 ? 'pos' : 'neg'}">${(net >= 0 ? '+' : '−') + fmt(net)}</td>
        <td style="color:var(--text-dim);font-size:0.82rem">${v.note || ''}</td>
      </tr>`;
    });

    const tNet = tP - tL;
    wrap.innerHTML = `
      <table>
        <thead><tr>
          <th>วันที่</th><th>วัน</th><th>กำไร</th><th>ขาดทุน</th><th>สุทธิ</th><th>หมายเหตุ</th>
        </tr></thead>
        <tbody>${rows}</tbody>
        <tfoot class="report-foot"><tr>
          <td colspan="2" style="font-family:'Sarabun',sans-serif">รวมทั้งเดือน</td>
          <td class="pos">${fmt(tP)}</td>
          <td class="neg">${fmt(tL)}</td>
          <td class="${tNet >= 0 ? 'pos' : 'neg'}">${(tNet >= 0 ? '+' : '−') + fmt(tNet)}</td>
          <td></td>
        </tr></tfoot>
      </table>`;
  }

  // ── Entry panel ───────────────────────────────────────────────
  function openEntry(key, day) {
    selectedKey = key;
    const data  = loadData(curYear, curMonth);
    const entry = data[key] || {};
    const [,, dd] = key.split('-');
    const dow = new Date(key).getDay();

    document.getElementById('entryDateLabel').textContent =
      `${parseInt(dd)} ${MONTHS_TH[curMonth]} ${curYear + 543} (${DAYS_TH[dow]})`;
    document.getElementById('inputProfit').value = entry.profit || '';
    document.getElementById('inputLoss').value   = entry.loss   || '';
    document.getElementById('inputNote').value   = entry.note   || '';
    document.getElementById('entryPanel').classList.add('open');
    document.getElementById('entryPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    render();
  }

  function closePanel() {
    selectedKey = null;
    document.getElementById('entryPanel').classList.remove('open');
    render();
  }

  function saveEntry() {
    if (!selectedKey) return;
    const data = loadData(curYear, curMonth);
    const p = parseFloat(document.getElementById('inputProfit').value) || 0;
    const l = parseFloat(document.getElementById('inputLoss').value)   || 0;
    const n = document.getElementById('inputNote').value.trim();

    if (p === 0 && l === 0 && !n) {
      delete data[selectedKey];
    } else {
      data[selectedKey] = { profit: p, loss: l, note: n };
    }
    saveData(curYear, curMonth, data);
    render();

    const btn = document.querySelector('.btn-save');
    btn.textContent = '✓ บันทึกแล้ว';
    setTimeout(() => btn.textContent = '💾 บันทึก', 1400);
  }

  function deleteEntry() {
    if (!selectedKey) return;
    if (!confirm('ลบข้อมูลวันนี้?')) return;
    const data = loadData(curYear, curMonth);
    delete data[selectedKey];
    saveData(curYear, curMonth, data);
    closePanel();
  }

  // ── Nav ───────────────────────────────────────────────────────
  function changeMonth(dir) {
    curMonth += dir;
    if (curMonth > 11) { curMonth = 0; curYear++; }
    if (curMonth < 0)  { curMonth = 11; curYear--; }
    selectedKey = null;
    document.getElementById('entryPanel').classList.remove('open');
    render();
  }

  // ── Init ──────────────────────────────────────────────────────
  initTheme();
  render();
</script>
</body>
</html>
