<!DOCTYPE html>
<html lang="th" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกกำไร/ขาดทุน & ค่าใช้จ่าย</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root,[data-theme="light"]{
    --bg:#f5f6fa;--surface:#fff;--surface2:#f0f1f7;--border:#dde0ec;
    --profit:#1a9e6e;--profit-dim:#1a9e6e14;--loss:#d94f5c;--loss-dim:#d94f5c12;
    --expense:#d07b00;--expense-dim:#d07b0012;
    --neutral:#8890a8;--text:#1e2235;--text-dim:#6b7390;--accent:#3b60e8;
    --accent-dim:#3b60e812;--today-bg:#3b60e810;--selected:#3b60e828;
    --shadow:0 1px 4px rgba(0,0,0,.07);
  }
  [data-theme="dark"]{
    --bg:#14161f;--surface:#1d2030;--surface2:#252840;--border:#333858;
    --profit:#2ec99a;--profit-dim:#2ec99a14;--loss:#f0606e;--loss-dim:#f0606e12;
    --expense:#f0a832;--expense-dim:#f0a83214;
    --neutral:#8890b8;--text:#d8ddf0;--text-dim:#8890b8;--accent:#6b8fff;
    --accent-dim:#6b8fff14;--today-bg:#6b8fff18;--selected:#6b8fff30;
    --shadow:0 1px 6px rgba(0,0,0,.35);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Sarabun',sans-serif;min-height:100vh;padding:20px;transition:background .25s,color .25s}

  .app-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px}
  .app-title{font-size:1.2rem;font-weight:700;color:var(--text)}
  .app-title span{color:var(--accent)}
  .header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .theme-btn{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;cursor:pointer;font-family:'Sarabun',sans-serif;font-size:.8rem;font-weight:600;color:var(--text-dim);display:flex;align-items:center;gap:5px;white-space:nowrap}
  .theme-btn:hover{border-color:var(--accent);color:var(--accent)}
  .nav-bar{display:flex;align-items:center;gap:10px}
  .nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
  .nav-btn:hover{border-color:var(--accent);background:var(--accent-dim)}
  .month-label{font-size:1rem;font-weight:700;min-width:150px;text-align:center}

  .tabs{display:flex;gap:6px;margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:5px;box-shadow:var(--shadow)}
  .tab{flex:1;padding:9px 12px;border-radius:7px;border:none;font-family:'Sarabun',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;color:var(--text-dim);background:transparent;transition:all .15s;text-align:center}
  .tab.active-pl{background:var(--accent);color:#fff}
  .tab.active-exp{background:var(--expense);color:#fff}
  .tab:not(.active-pl):not(.active-exp):hover{background:var(--surface2)}

  .status-bar{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--text-dim);margin-bottom:14px;min-height:20px}
  .status-dot{width:8px;height:8px;border-radius:50%;background:var(--neutral);flex-shrink:0;transition:background .3s}
  .status-dot.ok{background:var(--profit)}
  .status-dot.loading{background:var(--accent);animation:pulse 1s infinite}
  .status-dot.error{background:var(--loss)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .summary-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
  .summary-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;box-shadow:var(--shadow)}
  .summary-card .lbl{font-size:.7rem;font-weight:600;color:var(--text-dim);margin-bottom:5px;letter-spacing:.3px;text-transform:uppercase}
  .summary-card .val{font-family:'IBM Plex Mono',monospace;font-size:1.1rem;font-weight:700;line-height:1}
  .profit-card .val{color:var(--profit)}
  .loss-card .val{color:var(--loss)}
  .net-card .val.pos{color:var(--profit)}
  .net-card .val.neg{color:var(--loss)}
  .net-card .val.zero{color:var(--neutral)}
  .days-card .val{color:var(--accent)}
  .grab-card .val{color:var(--accent)}
  .exp-card .val{color:var(--expense)}
  .remain-card .val.pos{color:var(--profit)}
  .remain-card .val.neg{color:var(--loss)}
  .remain-card .val.zero{color:var(--neutral)}

  .calendar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow)}
  .cal-head{display:grid;grid-template-columns:repeat(7,1fr);background:var(--surface2);border-bottom:1px solid var(--border)}
  .cal-head-cell{text-align:center;padding:9px 4px;font-size:.7rem;font-weight:700;color:var(--text-dim);text-transform:uppercase}
  .cal-head-cell:first-child{color:var(--loss)}
  .cal-head-cell:last-child{color:var(--accent)}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:86px;padding:6px;cursor:pointer;transition:background .12s;display:flex;flex-direction:column}
  .cal-cell:nth-child(7n){border-right:none}
  .cal-cell:hover{background:var(--accent-dim)}
  .cal-cell.empty{cursor:default;background:transparent!important;opacity:.3}
  .cal-cell.today{background:var(--today-bg)}
  .cal-cell.selected{background:var(--selected)!important;outline:2px solid var(--accent);outline-offset:-2px}
  .mode-pl .cal-cell.has-profit{background:var(--profit-dim)}
  .mode-pl .cal-cell.has-loss{background:var(--loss-dim)}
  .mode-exp .cal-cell.has-expense{background:var(--expense-dim)}

  .day-num{font-size:.82rem;font-weight:700;color:var(--text-dim);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin-bottom:2px}
  .cal-cell.today .day-num{background:var(--accent);color:#fff}
  .day-sunday .day-num{color:var(--loss)}
  .day-saturday .day-num{color:var(--accent)}
  .day-note{font-size:.62rem;color:var(--text-dim);overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;line-height:1.3;margin-top:2px}
  .day-amount{font-family:'IBM Plex Mono',monospace;font-size:.75rem;font-weight:700;margin-top:auto;padding-top:2px}
  .day-amount.pos{color:var(--profit)}
  .day-amount.neg{color:var(--loss)}
  .day-amount.exp{color:var(--expense)}

  .entry-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;display:none;box-shadow:var(--shadow)}
  .entry-panel.open{display:block}
  .entry-title{font-size:.92rem;font-weight:600;margin-bottom:14px;color:var(--text-dim)}
  .entry-title strong{color:var(--text)}

  /* item rows */
  .item-row{display:grid;gap:8px;margin-bottom:10px;align-items:end}
  .item-row.pl-row{display:grid;grid-template-columns:110px 85px 1fr 100px 100px 32px;column-gap:8px}
  .item-row.pl-row .pl-cat-wrap{grid-column:1}
  .item-row.pl-row .pl-trips-wrap{grid-column:2}
  .item-row.pl-row .pl-note-wrap{grid-column:3}
  .item-row.pl-row .pl-profit-wrap{grid-column:4}
  .item-row.pl-row .pl-loss-wrap{grid-column:5}
  .item-row.pl-row .del-wrap{grid-column:6}
  .item-row.pl-row .pl-trips-wrap.hidden{visibility:hidden}
  .item-row.exp-row{grid-template-columns:110px 1fr 110px 32px}

  .field label{display:block;font-size:.7rem;font-weight:700;color:var(--text-dim);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
  .field input,.field textarea,.field select{width:100%;background:var(--surface2);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:.95rem;padding:8px 10px;outline:none;transition:border-color .15s}
  .field input:focus,.field textarea:focus,.field select:focus{border-color:var(--accent)}
  .field select{font-family:'Sarabun',sans-serif;font-size:.88rem;cursor:pointer}
  .del-btn{width:32px;height:38px;border-radius:7px;border:1.5px solid var(--loss);background:transparent;color:var(--loss);cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center}
  .del-btn:hover{background:var(--loss-dim)}

  .add-row-btn{width:100%;padding:8px;border-radius:7px;border:1.5px dashed var(--border);background:transparent;color:var(--text-dim);font-family:'Sarabun',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;margin-bottom:14px;transition:border-color .15s,color .15s}
  .add-row-btn:hover{border-color:var(--accent);color:var(--accent)}

  .entry-actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{padding:9px 18px;border-radius:7px;border:none;font-family:'Sarabun',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:opacity .15s,transform .1s}
  .btn:active{transform:scale(.97)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-save-pl{background:var(--accent);color:#fff}
  .btn-save-exp{background:var(--expense);color:#fff}
  .btn-delete{background:transparent;border:1.5px solid var(--loss);color:var(--loss)}
  .btn-close{background:transparent;border:1.5px solid var(--border);color:var(--text-dim);margin-left:auto}
  .btn:not(:disabled):hover{opacity:.82}

  .report-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:var(--shadow)}
  .report-header{background:var(--surface2);padding:13px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
  .report-header h2{font-size:.88rem;font-weight:700}
  .btn-print{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:6px 14px;font-family:'Sarabun',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer}
  .report-table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse}
  thead th{background:var(--surface2);color:var(--text-dim);font-size:.7rem;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border)}
  tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
  tbody tr:hover{background:var(--surface2)}
  tbody tr:last-child{border-bottom:none}
  td{padding:9px 14px;font-size:.86rem;color:var(--text);vertical-align:top}
  td.mono{font-family:'IBM Plex Mono',monospace;font-size:.83rem}
  td.pos{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--profit)}
  td.neg{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--loss)}
  td.exp{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--expense)}
  .report-foot td{background:var(--surface2);font-weight:700;font-size:.9rem;border-top:2px solid var(--border)!important}
  .report-foot td.pos{font-family:'IBM Plex Mono',monospace;color:var(--profit)}
  .report-foot td.neg{font-family:'IBM Plex Mono',monospace;color:var(--loss)}
  .report-foot td.exp{font-family:'IBM Plex Mono',monospace;color:var(--expense)}
  .empty-report{text-align:center;color:var(--text-dim);padding:36px 20px;font-size:.86rem}

  .cat-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:600}
  .badge-grab{background:#3b60e818;color:var(--accent)}
  .badge-trade{background:var(--profit-dim);color:var(--profit)}
  .badge-other{background:var(--surface2);color:var(--text-dim)}
  .badge-exp{background:var(--expense-dim);color:var(--expense)}

  @media print{
    body{background:#fff;color:#000;padding:0}
    .app-header,.entry-panel,.calendar-wrap,.btn-print,.theme-btn,.status-bar,.tabs{display:none!important}
    .summary-card .val,.summary-card .lbl{color:#000!important}
    .report-section{border:1px solid #ccc}
    thead th,.report-foot td{background:#f4f4f4!important}
    td,th{border:1px solid #ddd}
  }
  @media(max-width:600px){
    body{padding:12px}
    .item-row.pl-row{grid-template-columns:1fr 1fr;column-gap:8px;row-gap:8px}
    .item-row.pl-row .pl-cat-wrap{grid-column:1}
    .item-row.pl-row .pl-trips-wrap{grid-column:2}
    .item-row.pl-row .pl-note-wrap{grid-column:1/3}
    .item-row.pl-row .pl-profit-wrap{grid-column:1}
    .item-row.pl-row .pl-loss-wrap{grid-column:2}
    .item-row.pl-row .del-wrap{grid-column:1/3;display:flex;justify-content:flex-end}
    .item-row.exp-row{grid-template-columns:1fr 1fr}
    .cal-cell{min-height:58px;padding:4px}
    .day-note{display:none}
    .summary-bar{grid-template-columns:1fr 1fr}
    .summary-card .val{font-size:.95rem}
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">📊 บันทึก<span>รายรับ/รายจ่าย</span></div>
  <div class="header-right">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙 Dark</button>
    <div class="nav-bar">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active-pl" id="tabPL"  onclick="switchMode('pl')">📈 กำไร / ขาดทุน</button>
  <button class="tab"           id="tabEXP" onclick="switchMode('exp')">💸 ค่าใช้จ่าย</button>
  <button class="tab"           id="tabSUM" onclick="switchMode('sum')">📋 สรุปรวม</button>
</div>

<div class="status-bar">
  <div class="status-dot loading" id="statusDot"></div>
  <span id="statusText">กำลังโหลดข้อมูล...</span>
</div>

<!-- Summary PL -->
<div class="summary-bar" id="summaryPL">
  <div class="summary-card profit-card"><div class="lbl">กำไรรวม</div><div class="val" id="sumProfit">฿0.00</div></div>
  <div class="summary-card loss-card"><div class="lbl">ขาดทุนรวม</div><div class="val" id="sumLoss">฿0.00</div></div>
  <div class="summary-card net-card"><div class="lbl">กำไรสุทธิ</div><div class="val zero" id="sumNet">฿0.00</div></div>
  <div class="summary-card days-card"><div class="lbl">วันที่บันทึก</div><div class="val" id="sumDays">0 วัน</div></div>
  <div class="summary-card grab-card"><div class="lbl">รอบขับแกร็บ</div><div class="val" id="sumTrips">0 รอบ</div></div>
</div>
<!-- Summary EXP -->
<div class="summary-bar" id="summaryEXP" style="display:none">
  <div class="summary-card exp-card"><div class="lbl">ค่าใช้จ่ายรวม</div><div class="val" id="sumExp">฿0.00</div></div>
  <div class="summary-card days-card"><div class="lbl">วันที่มีรายจ่าย</div><div class="val" id="sumExpDays">0 วัน</div></div>
</div>
<!-- Summary ALL -->
<div class="summary-bar" id="summaryALL" style="display:none">
  <div class="summary-card net-card"><div class="lbl">กำไรสุทธิ</div><div class="val zero" id="sumAllNet">฿0.00</div></div>
  <div class="summary-card exp-card"><div class="lbl">ค่าใช้จ่ายรวม</div><div class="val" id="sumAllExp">฿0.00</div></div>
  <div class="summary-card remain-card"><div class="lbl">คงเหลือสุทธิ</div><div class="val zero" id="sumRemain">฿0.00</div></div>
</div>

<!-- Calendar -->
<div class="calendar-wrap">
  <div class="cal-head">
    <div class="cal-head-cell">อา</div><div class="cal-head-cell">จ</div>
    <div class="cal-head-cell">อ</div><div class="cal-head-cell">พ</div>
    <div class="cal-head-cell">พฤ</div><div class="cal-head-cell">ศ</div>
    <div class="cal-head-cell">ส</div>
  </div>
  <div class="cal-grid mode-pl" id="calGrid"></div>
</div>

<!-- Entry Panel PL -->
<div class="entry-panel" id="entryPanelPL">
  <div class="entry-title">📈 กำไร/ขาดทุน — <strong id="entryDatePL"></strong></div>
  <div id="plList"></div>
  <button class="add-row-btn" onclick="addPLRow()">+ เพิ่มรายการ</button>
  <div class="entry-actions">
    <button class="btn btn-save-pl" id="btnSavePL" onclick="savePL()">💾 บันทึกทั้งหมด</button>
    <button class="btn btn-delete"  id="btnDeletePL" onclick="deletePL()">🗑 ลบทั้งวัน</button>
    <button class="btn btn-close" onclick="closePanel('PL')">✕ ปิด</button>
  </div>
</div>

<!-- Entry Panel EXP -->
<div class="entry-panel" id="entryPanelEXP">
  <div class="entry-title">💸 ค่าใช้จ่าย — <strong id="entryDateEXP"></strong></div>
  <div id="expList"></div>
  <button class="add-row-btn" onclick="addEXPRow()">+ เพิ่มรายการ</button>
  <div class="entry-actions">
    <button class="btn btn-save-exp" id="btnSaveEXP" onclick="saveEXP()">💾 บันทึกทั้งหมด</button>
    <button class="btn btn-delete"   id="btnDeleteEXP" onclick="deleteEXP()">🗑 ลบทั้งวัน</button>
    <button class="btn btn-close" onclick="closePanel('EXP')">✕ ปิด</button>
  </div>
</div>

<!-- Report -->
<div class="report-section">
  <div class="report-header">
    <h2 id="reportTitle">รายงานประจำเดือน</h2>
    <button class="btn-print" onclick="window.print()">🖨️ พิมพ์</button>
  </div>
  <div class="report-table-wrap"><div id="reportBody"></div></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwCwc1smE0iFOfiO07stA5P3KSstjhh8DKH6jqPUrsoSGY1YeQuz-pQZkJulL4fxGyb/exec';
const MONTHS_TH = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
const DAYS_TH   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const PL_CATS   = ['ขับแกร็บ','เทรด','อื่นๆ'];
const EXP_CATS  = ['อาหาร','เดินทาง','ช้อปปิ้ง','สาธารณูปโภค','บันเทิง','สุขภาพ','อื่นๆ'];

// plData[date] = [ {cat, profit, loss, note}, ... ]
// expData[date] = [ {cat, desc, amount}, ... ]
let today = new Date(), curYear = today.getFullYear(), curMonth = today.getMonth();
let selectedKey = null, mode = 'pl';
let plData = {}, expData = {};

function plKey(k)  { return 'PL_'  + k; }
function expKey(k) { return 'EXP_' + k; }

// ── Status ───────────────────────────────────────────────────
function setStatus(s, t) {
  document.getElementById('statusDot').className = 'status-dot ' + s;
  document.getElementById('statusText').textContent = t;
}

// ── Theme ────────────────────────────────────────────────────
function initTheme() { setTheme(localStorage.getItem('plcal_theme') || 'light'); }
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('plcal_theme', t);
  document.getElementById('themeBtn').textContent = t === 'dark' ? '☀️ Light' : '🌙 Dark';
}
function toggleTheme() {
  setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

// ── Format ────────────────────────────────────────────────────
function fmt(n) {
  return '฿' + Math.abs(n).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function badgePL(cat) {
  const cls = cat==='ขับแกร็บ'?'badge-grab':cat==='เทรด'?'badge-trade':'badge-other';
  return `<span class="cat-badge ${cls}">${cat||'—'}</span>`;
}
function badgeEXP(cat) {
  return `<span class="cat-badge badge-exp">${cat||'อื่นๆ'}</span>`;
}

// ── API ───────────────────────────────────────────────────────
function fetchAll() {
  setStatus('loading', 'กำลังโหลดข้อมูล...');
  const cb = '__gsCb_' + Date.now();
  const script = document.createElement('script');
  const timer = setTimeout(() => {
    cleanup(); setStatus('error','โหลดนานเกินไป'); render();
  }, 12000);

  window[cb] = function(data) {
    cleanup();
    plData = {}; expData = {};
    Object.entries(data).forEach(([k, v]) => {
      if (k.startsWith('PL_')) {
        const date = k.slice(3);
        try { plData[date] = typeof v.items === 'string' ? JSON.parse(v.items) : (v.items || []); }
        catch { plData[date] = []; }
      } else if (k.startsWith('EXP_')) {
        const date = k.slice(4);
        try { expData[date] = typeof v.items === 'string' ? JSON.parse(v.items) : (v.items || []); }
        catch { expData[date] = []; }
      }
    });
    setStatus('ok', 'โหลดสำเร็จ · ' + new Date().toLocaleTimeString('th-TH'));
    render();
  };

  function cleanup() {
    clearTimeout(timer); delete window[cb];
    if (script.parentNode) script.parentNode.removeChild(script);
  }
  script.onerror = () => { cleanup(); setStatus('error','โหลดไม่ได้'); render(); };
  script.src = API + '?callback=' + cb;
  document.head.appendChild(script);
}

async function apiPost(params) {
  await fetch(API, {
    method:'POST', mode:'no-cors',
    headers:{'Content-Type':'application/x-www-form-urlencoded'},
    body: new URLSearchParams(params).toString()
  });
}

// ── Mode ─────────────────────────────────────────────────────
function switchMode(m) {
  mode = m;
  document.getElementById('tabPL').className  = 'tab' + (m==='pl'  ? ' active-pl'  : '');
  document.getElementById('tabEXP').className = 'tab' + (m==='exp' ? ' active-exp' : '');
  document.getElementById('tabSUM').className = 'tab' + (m==='sum' ? ' active-pl'  : '');
  selectedKey = null;
  document.getElementById('entryPanelPL').classList.remove('open');
  document.getElementById('entryPanelEXP').classList.remove('open');
  render();
}

// ── Month helpers ─────────────────────────────────────────────
function monthPrefix() { return curYear + '-' + String(curMonth+1).padStart(2,'0'); }
function monthPL()  { const p=monthPrefix(); const o={}; Object.entries(plData).forEach(([k,v])=>{if(k.startsWith(p))o[k]=v;}); return o; }
function monthEXP() { const p=monthPrefix(); const o={}; Object.entries(expData).forEach(([k,v])=>{if(k.startsWith(p))o[k]=v;}); return o; }

// ── Totals ───────────────────────────────────────────────────
function plTotals(items) {
  let p=0,l=0,trips=0;
  (items||[]).forEach(i=>{ p+=Number(i.profit)||0; l+=Number(i.loss)||0; if(i.cat==='ขับแกร็บ') trips+=Number(i.trips)||0; });
  return {profit:p, loss:l, net:p-l, trips};
}
function expTotal(items) { return (items||[]).reduce((a,i)=>a+(Number(i.amount)||0),0); }

// ── Render ────────────────────────────────────────────────────
function render() {
  const mLabel = MONTHS_TH[curMonth] + ' ' + (curYear+543);
  document.getElementById('monthLabel').textContent  = mLabel;
  document.getElementById('reportTitle').textContent = 'รายงานประจำเดือน' + mLabel;

  const dataPL = monthPL(), dataEXP = monthEXP();

  // PL summary
  let tP=0,tL=0,plDays=0,tTrips=0;
  Object.values(dataPL).forEach(items => {
    const t=plTotals(items); if(t.profit||t.loss){plDays++;tP+=t.profit;tL+=t.loss;} tTrips+=t.trips;
  });
  const netPL = tP-tL;
  document.getElementById('sumProfit').textContent = fmt(tP);
  document.getElementById('sumLoss').textContent   = fmt(tL);
  const nEl = document.getElementById('sumNet');
  nEl.textContent = (netPL>=0?'+':'−')+fmt(netPL);
  nEl.className   = 'val '+(netPL>0?'pos':netPL<0?'neg':'zero');
  document.getElementById('sumDays').textContent = plDays+' วัน';
  document.getElementById('sumTrips').textContent = tTrips+' รอบ';

  // EXP summary
  let tExp=0,expDays=0;
  Object.values(dataEXP).forEach(items=>{ const s=expTotal(items); if(s>0){expDays++;tExp+=s;} });
  document.getElementById('sumExp').textContent     = fmt(tExp);
  document.getElementById('sumExpDays').textContent = expDays+' วัน';

  // ALL summary
  const remain = netPL-tExp;
  document.getElementById('sumAllNet').textContent = (netPL>=0?'+':'−')+fmt(netPL);
  document.getElementById('sumAllNet').className   = 'val '+(netPL>0?'pos':netPL<0?'neg':'zero');
  document.getElementById('sumAllExp').textContent = fmt(tExp);
  const rEl = document.getElementById('sumRemain');
  rEl.textContent = (remain>=0?'+':'−')+fmt(remain);
  rEl.className   = 'val '+(remain>0?'pos':remain<0?'neg':'zero');

  document.getElementById('summaryPL').style.display  = mode==='pl'  ? 'grid':'none';
  document.getElementById('summaryEXP').style.display = mode==='exp' ? 'grid':'none';
  document.getElementById('summaryALL').style.display = mode==='sum' ? 'grid':'none';

  renderCalendar(dataPL, dataEXP);
  renderReport(dataPL, dataEXP);
}

function renderCalendar(dataPL, dataEXP) {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  grid.className = 'cal-grid '+(mode==='exp'?'mode-exp':'mode-pl');

  const firstDay    = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();

  for (let i=0;i<firstDay;i++) { const c=document.createElement('div'); c.className='cal-cell empty'; grid.appendChild(c); }

  for (let d=1;d<=daysInMonth;d++) {
    const key  = curYear+'-'+String(curMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const plt  = plTotals(dataPL[key]);
    const expt = expTotal(dataEXP[key]);
    const dow  = new Date(curYear,curMonth,d).getDay();
    const isToday = curYear===today.getFullYear()&&curMonth===today.getMonth()&&d===today.getDate();

    let cls='cal-cell';
    if(dow===0) cls+=' day-sunday';
    if(dow===6) cls+=' day-saturday';
    if(isToday) cls+=' today';
    if(plt.profit>0&&plt.loss===0) cls+=' has-profit';
    if(plt.loss>0&&plt.profit===0) cls+=' has-loss';
    if(expt>0) cls+=' has-expense';
    if(key===selectedKey) cls+=' selected';

    const cell=document.createElement('div'); cell.className=cls; cell.onclick=()=>openEntry(key);
    const dn=document.createElement('div'); dn.className='day-num'; dn.textContent=d; cell.appendChild(dn);

    if (mode==='pl'||mode==='sum') {
      if (plt.profit||plt.loss) {
        const amt=document.createElement('div');
        amt.className='day-amount '+(plt.net>=0?'pos':'neg');
        amt.textContent=(plt.net>=0?'+':'−')+fmt(plt.net) + (plt.trips>0?' · '+plt.trips+'รอบ':'');
        cell.appendChild(amt);
      }
    }
    if (mode==='exp'||mode==='sum') {
      if (expt>0) {
        const amt=document.createElement('div'); amt.className='day-amount exp';
        amt.textContent='−'+fmt(expt); cell.appendChild(amt);
      }
    }
    grid.appendChild(cell);
  }
}

function renderReport(dataPL, dataEXP) {
  const wrap = document.getElementById('reportBody');
  if (mode==='pl')  { renderReportPL(wrap,dataPL); return; }
  if (mode==='exp') { renderReportEXP(wrap,dataEXP); return; }
  const allDates = new Set([...Object.keys(dataPL),...Object.keys(dataEXP)]);
  renderReportAll(wrap,dataPL,dataEXP,[...allDates].sort());
}

function renderReportPL(wrap, dataPL) {
  const entries = Object.entries(dataPL).filter(([,v])=>v&&v.length).sort(([a],[b])=>a<b?-1:1);
  if (!entries.length) { wrap.innerHTML='<div class="empty-report">ยังไม่มีข้อมูลกำไร/ขาดทุนในเดือนนี้</div>'; return; }
  let tP=0,tL=0,tTrips=0,rows='';
  entries.forEach(([key,items])=>{
    const [,,dd]=key.split('-'); const dow=new Date(key).getDay();
    items.forEach(item=>{
      const p=Number(item.profit)||0, l=Number(item.loss)||0, net=p-l;
      const trips = item.cat==='ขับแกร็บ' ? (Number(item.trips)||0) : 0;
      tP+=p; tL+=l; tTrips+=trips;
      rows+=`<tr>
        <td class="mono">${parseInt(dd)} ${MONTHS_TH[curMonth]}</td>
        <td>${DAYS_TH[dow]}</td>
        <td>${badgePL(item.cat)}</td>
        <td class="mono">${trips>0?trips+' รอบ':'—'}</td>
        <td class="${p>0?'pos':'mono'}">${p>0?fmt(p):'—'}</td>
        <td class="${l>0?'neg':'mono'}">${l>0?fmt(l):'—'}</td>
        <td class="${net>=0?'pos':'neg'}">${(net>=0?'+':'−')+fmt(net)}</td>
        <td style="color:var(--text-dim);font-size:.8rem">${item.note||''}</td>
      </tr>`;
    });
  });
  const tNet=tP-tL;
  wrap.innerHTML=`<table><thead><tr><th>วันที่</th><th>วัน</th><th>หมวด</th><th>รอบ</th><th>กำไร</th><th>ขาดทุน</th><th>สุทธิ</th><th>หมายเหตุ</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot class="report-foot"><tr>
      <td colspan="3" style="font-family:'Sarabun',sans-serif">รวมทั้งเดือน</td>
      <td class="mono">${tTrips>0?tTrips+' รอบ':'—'}</td>
      <td class="pos">${fmt(tP)}</td><td class="neg">${fmt(tL)}</td>
      <td class="${tNet>=0?'pos':'neg'}">${(tNet>=0?'+':'−')+fmt(tNet)}</td><td></td>
    </tr></tfoot></table>`;
}

function renderReportEXP(wrap, dataEXP) {
  const entries = Object.entries(dataEXP).filter(([,v])=>v&&v.length).sort(([a],[b])=>a<b?-1:1);
  if (!entries.length) { wrap.innerHTML='<div class="empty-report">ยังไม่มีข้อมูลค่าใช้จ่ายในเดือนนี้</div>'; return; }
  let total=0,rows='';
  entries.forEach(([key,items])=>{
    const [,,dd]=key.split('-'); const dow=new Date(key).getDay();
    items.forEach(item=>{
      const amt=Number(item.amount)||0; total+=amt;
      rows+=`<tr>
        <td class="mono">${parseInt(dd)} ${MONTHS_TH[curMonth]}</td>
        <td>${DAYS_TH[dow]}</td>
        <td>${badgeEXP(item.cat)}</td>
        <td style="font-size:.82rem">${item.desc||''}</td>
        <td class="exp">${fmt(amt)}</td>
      </tr>`;
    });
  });
  wrap.innerHTML=`<table><thead><tr><th>วันที่</th><th>วัน</th><th>หมวด</th><th>รายละเอียด</th><th>จำนวน</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot class="report-foot"><tr>
      <td colspan="4" style="font-family:'Sarabun',sans-serif">รวมค่าใช้จ่าย</td>
      <td class="exp">${fmt(total)}</td>
    </tr></tfoot></table>`;
}

function renderReportAll(wrap, dataPL, dataEXP, entries) {
  if (!entries.length) { wrap.innerHTML='<div class="empty-report">ยังไม่มีข้อมูลในเดือนนี้</div>'; return; }
  let tP=0,tL=0,tExp=0,rows='';
  entries.forEach(key=>{
    const plt=plTotals(dataPL[key]); const expt=expTotal(dataEXP[key]);
    if(!plt.profit&&!plt.loss&&!expt) return;
    tP+=plt.profit; tL+=plt.loss; tExp+=expt;
    const [,,dd]=key.split('-'); const dow=new Date(key).getDay();
    const remain=plt.net-expt;
    rows+=`<tr>
      <td class="mono">${parseInt(dd)} ${MONTHS_TH[curMonth]}</td><td>${DAYS_TH[dow]}</td>
      <td class="${plt.net>=0?'pos':'neg'}">${(plt.net>=0?'+':'−')+fmt(plt.net)}</td>
      <td class="${expt>0?'exp':'mono'}">${expt>0?fmt(expt):'—'}</td>
      <td class="${remain>=0?'pos':'neg'}">${(remain>=0?'+':'−')+fmt(remain)}</td>
    </tr>`;
  });
  const tNet=tP-tL, tRemain=tNet-tExp;
  wrap.innerHTML=`<table><thead><tr><th>วันที่</th><th>วัน</th><th>กำไรสุทธิ</th><th>ค่าใช้จ่าย</th><th>คงเหลือ</th></tr></thead>
    <tbody>${rows}</tbody>
    <tfoot class="report-foot"><tr>
      <td colspan="2" style="font-family:'Sarabun',sans-serif">รวมทั้งเดือน</td>
      <td class="${tNet>=0?'pos':'neg'}">${(tNet>=0?'+':'−')+fmt(tNet)}</td>
      <td class="exp">${fmt(tExp)}</td>
      <td class="${tRemain>=0?'pos':'neg'}">${(tRemain>=0?'+':'−')+fmt(tRemain)}</td>
    </tr></tfoot></table>`;
}

// ── Entry open ────────────────────────────────────────────────
function openEntry(key) {
  selectedKey = key;
  const [,,dd]=key.split('-'); const dow=new Date(key).getDay();
  const label=parseInt(dd)+' '+MONTHS_TH[curMonth]+' '+(curYear+543)+' ('+DAYS_TH[dow]+')';

  if (mode==='exp') {
    document.getElementById('entryPanelPL').classList.remove('open');
    document.getElementById('entryDateEXP').textContent=label;
    buildEXPList(key);
    document.getElementById('entryPanelEXP').classList.add('open');
    document.getElementById('entryPanelEXP').scrollIntoView({behavior:'smooth',block:'nearest'});
  } else {
    document.getElementById('entryPanelEXP').classList.remove('open');
    document.getElementById('entryDatePL').textContent=label;
    buildPLList(key);
    document.getElementById('entryPanelPL').classList.add('open');
    document.getElementById('entryPanelPL').scrollIntoView({behavior:'smooth',block:'nearest'});
  }
  render();
}

function closePanel(which) {
  document.getElementById('entryPanel'+which).classList.remove('open');
  selectedKey=null; render();
}

// ── PL rows ───────────────────────────────────────────────────
function buildPLList(key) {
  const items=(plData[key]||[]).slice();
  const list=document.getElementById('plList'); list.innerHTML='';
  if(!items.length) items.push({cat:'ขับแกร็บ',profit:'',loss:'',note:'',trips:''});
  items.forEach(item=>addPLRowData(item));
}

function addPLRow() { addPLRowData({cat:'ขับแกร็บ',profit:'',loss:'',note:'',trips:''}); }

function onPLCatChange(sel) {
  const row = sel.closest('.item-row');
  const tripsField = row.querySelector('.pl-trips-wrap');
  if (sel.value === 'ขับแกร็บ') tripsField.classList.remove('hidden');
  else tripsField.classList.add('hidden');
}

function addPLRowData(item) {
  const list=document.getElementById('plList');
  const wrap=document.createElement('div'); wrap.className='item-row pl-row';
  const isGrab = (item.cat||'ขับแกร็บ') === 'ขับแกร็บ';
  wrap.innerHTML=`
    <div class="field pl-cat-wrap"><label>หมวด</label>
      <select class="pl-cat" onchange="onPLCatChange(this)">${PL_CATS.map(c=>`<option${c===(item.cat||'ขับแกร็บ')?' selected':''}>${c}</option>`).join('')}</select>
    </div>
    <div class="field pl-trips-wrap${isGrab?'':' hidden'}"><label>รอบ</label>
      <input type="number" class="pl-trips" placeholder="0" min="0" step="1" value="${item.trips||''}">
    </div>
    <div class="field pl-note-wrap"><label>หมายเหตุ</label>
      <input type="text" class="pl-note" placeholder="รายละเอียด..." value="${item.note||''}">
    </div>
    <div class="field pl-profit-wrap"><label>กำไร (฿)</label>
      <input type="number" class="pl-profit" placeholder="0.00" min="0" step="0.01" value="${item.profit||''}">
    </div>
    <div class="field pl-loss-wrap"><label>ขาดทุน (฿)</label>
      <input type="number" class="pl-loss" placeholder="0.00" min="0" step="0.01" value="${item.loss||''}">
    </div>
    <div class="field del-wrap"><label style="visibility:hidden">ลบ</label>
      <button class="del-btn" onclick="this.closest('.item-row').remove()">✕</button>
    </div>`;
  list.appendChild(wrap);
}

function setBusyPL(b) { document.getElementById('btnSavePL').disabled=b; document.getElementById('btnDeletePL').disabled=b; }

async function savePL() {
  if (!selectedKey) return;
  const rows=document.getElementById('plList').querySelectorAll('.item-row');
  const items=[];
  rows.forEach(row=>{
    const cat=row.querySelector('.pl-cat').value;
    const note=row.querySelector('.pl-note').value.trim();
    const p=parseFloat(row.querySelector('.pl-profit').value)||0;
    const l=parseFloat(row.querySelector('.pl-loss').value)||0;
    const trips=cat==='ขับแกร็บ' ? (parseInt(row.querySelector('.pl-trips').value)||0) : 0;
    if(p||l||note||trips) items.push({cat,profit:p,loss:l,note,trips});
  });
  setBusyPL(true); setStatus('loading','กำลังบันทึก...');
  try {
    if(!items.length) {
      await apiPost({key:plKey(selectedKey),action:'delete'});
      delete plData[selectedKey];
    } else {
      await apiPost({key:plKey(selectedKey),profit:0,loss:0,note:JSON.stringify(items),action:'save'});
      plData[selectedKey]=items;
    }
    setStatus('ok','บันทึกสำเร็จ · '+new Date().toLocaleTimeString('th-TH'));
    render();
    const btn=document.getElementById('btnSavePL');
    btn.textContent='✓ บันทึกแล้ว';
    setTimeout(()=>btn.textContent='💾 บันทึกทั้งหมด',1400);
  } catch(e){ setStatus('error','เกิดข้อผิดพลาด'); }
  setBusyPL(false);
}

async function deletePL() {
  if(!selectedKey||!confirm('ลบข้อมูลกำไร/ขาดทุนทั้งวัน?')) return;
  setBusyPL(true); setStatus('loading','กำลังลบ...');
  try {
    await apiPost({key:plKey(selectedKey),action:'delete'});
    delete plData[selectedKey];
    setStatus('ok','ลบสำเร็จ'); closePanel('PL');
  } catch(e){ setStatus('error','ลบไม่สำเร็จ'); }
  setBusyPL(false);
}

// ── EXP rows ──────────────────────────────────────────────────
function buildEXPList(key) {
  const items=(expData[key]||[]).slice();
  const list=document.getElementById('expList'); list.innerHTML='';
  if(!items.length) items.push({cat:'อื่นๆ',desc:'',amount:''});
  items.forEach(item=>addEXPRowData(item));
}

function addEXPRow() { addEXPRowData({cat:'อื่นๆ',desc:'',amount:''}); }

function addEXPRowData(item) {
  const list=document.getElementById('expList');
  const wrap=document.createElement('div'); wrap.className='item-row exp-row';
  wrap.innerHTML=`
    <div class="field"><label>หมวด</label>
      <select class="exp-cat">${EXP_CATS.map(c=>`<option${c===(item.cat||'อื่นๆ')?' selected':''}>${c}</option>`).join('')}</select>
    </div>
    <div class="field"><label>รายละเอียด</label>
      <input type="text" class="exp-desc" placeholder="รายการ..." value="${item.desc||''}">
    </div>
    <div class="field"><label>จำนวน (฿)</label>
      <input type="number" class="exp-amt" placeholder="0.00" min="0" step="0.01" value="${item.amount||''}">
    </div>
    <div class="field del-wrap"><label style="visibility:hidden">ลบ</label>
      <button class="del-btn" onclick="this.closest('.item-row').remove()">✕</button>
    </div>`;
  list.appendChild(wrap);
}

function setBusyEXP(b) { document.getElementById('btnSaveEXP').disabled=b; document.getElementById('btnDeleteEXP').disabled=b; }

async function saveEXP() {
  if(!selectedKey) return;
  const rows=document.getElementById('expList').querySelectorAll('.item-row');
  const items=[];
  rows.forEach(row=>{
    const cat=row.querySelector('.exp-cat').value;
    const desc=row.querySelector('.exp-desc').value.trim();
    const amt=parseFloat(row.querySelector('.exp-amt').value)||0;
    if(amt||desc) items.push({cat,desc,amount:amt});
  });
  setBusyEXP(true); setStatus('loading','กำลังบันทึก...');
  try {
    if(!items.length) {
      await apiPost({key:expKey(selectedKey),action:'delete'});
      delete expData[selectedKey];
    } else {
      await apiPost({key:expKey(selectedKey),profit:0,loss:0,note:JSON.stringify(items),action:'save'});
      expData[selectedKey]=items;
    }
    setStatus('ok','บันทึกสำเร็จ · '+new Date().toLocaleTimeString('th-TH'));
    render();
    const btn=document.getElementById('btnSaveEXP');
    btn.textContent='✓ บันทึกแล้ว';
    setTimeout(()=>btn.textContent='💾 บันทึกทั้งหมด',1400);
  } catch(e){ setStatus('error','เกิดข้อผิดพลาด'); }
  setBusyEXP(false);
}

async function deleteEXP() {
  if(!selectedKey||!confirm('ลบค่าใช้จ่ายทั้งวัน?')) return;
  setBusyEXP(true); setStatus('loading','กำลังลบ...');
  try {
    await apiPost({key:expKey(selectedKey),action:'delete'});
    delete expData[selectedKey];
    setStatus('ok','ลบสำเร็จ'); closePanel('EXP');
  } catch(e){ setStatus('error','ลบไม่สำเร็จ'); }
  setBusyEXP(false);
}

// ── Nav ───────────────────────────────────────────────────────
function changeMonth(dir) {
  curMonth+=dir;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  selectedKey=null;
  document.getElementById('entryPanelPL').classList.remove('open');
  document.getElementById('entryPanelEXP').classList.remove('open');
  render();
}

// ── Init ──────────────────────────────────────────────────────
initTheme();
fetchAll();
</script>
