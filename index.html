<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกกำไร/ขาดทุนประจำวัน</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222636;
    --border: #2e3348;
    --profit: #00d4a0;
    --profit-dim: #00d4a015;
    --loss: #ff5c6c;
    --loss-dim: #ff5c6c15;
    --neutral: #7c8db5;
    --text: #e8ecf4;
    --text-dim: #7c8db5;
    --accent: #4f79ff;
    --accent-dim: #4f79ff18;
    --today: #4f79ff30;
    --selected: #4f79ff50;
    --radius: 10px;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Sarabun', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 20px;
  }

  /* ─── Header ─── */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .app-title {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .app-title span {
    color: var(--accent);
  }

  /* ─── Navigation ─── */
  .nav-bar {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px;
    height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .nav-btn:hover { background: var(--accent-dim); border-color: var(--accent); }

  .month-label {
    font-size: 1rem;
    font-weight: 600;
    min-width: 140px;
    text-align: center;
    color: var(--text);
  }

  /* ─── Monthly summary bar ─── */
  .summary-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .summary-card .label {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .summary-card .value {
    font-family: var(--mono);
    font-size: 1.15rem;
    font-weight: 600;
  }

  .summary-card.profit-card .value { color: var(--profit); }
  .summary-card.loss-card .value   { color: var(--loss); }
  .summary-card.net-card .value.pos { color: var(--profit); }
  .summary-card.net-card .value.neg { color: var(--loss); }
  .summary-card.net-card .value.zero { color: var(--neutral); }
  .summary-card.days-card .value    { color: var(--accent); }

  /* ─── Calendar grid ─── */
  .calendar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }

  .cal-head {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  .cal-head-cell {
    text-align: center;
    padding: 10px 4px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .cal-head-cell:first-child { color: #ff7c8a; }
  .cal-head-cell:last-child  { color: #6fa3ff; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
  }

  .cal-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    min-height: 80px;
    padding: 6px;
    cursor: pointer;
    position: relative;
    transition: background 0.12s;
    display: flex;
    flex-direction: column;
  }

  .cal-cell:nth-child(7n)   { border-right: none; }
  .cal-cell:hover { background: var(--accent-dim); }
  .cal-cell.empty { cursor: default; background: transparent !important; }
  .cal-cell.today { background: var(--today); }
  .cal-cell.selected { background: var(--selected) !important; outline: 2px solid var(--accent); outline-offset: -2px; }
  .cal-cell.has-profit { background: var(--profit-dim); }
  .cal-cell.has-loss    { background: var(--loss-dim); }

  .day-num {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-dim);
    line-height: 1;
    margin-bottom: 4px;
  }

  .cal-cell.today .day-num {
    background: var(--accent);
    color: #fff;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
  }

  .day-sunday   .day-num { color: #ff7c8a; }
  .day-saturday .day-num { color: #6fa3ff; }

  .day-amount {
    font-family: var(--mono);
    font-size: 0.72rem;
    font-weight: 600;
    margin-top: auto;
  }

  .day-amount.pos { color: var(--profit); }
  .day-amount.neg { color: var(--loss); }

  .day-note {
    font-size: 0.62rem;
    color: var(--text-dim);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    line-height: 1.3;
    margin-top: 2px;
  }

  /* ─── Entry panel ─── */
  .entry-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 20px;
    display: none;
  }

  .entry-panel.open { display: block; }

  .entry-title {
    font-size: 0.9rem;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text-dim);
  }

  .entry-title strong { color: var(--text); }

  .entry-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .field label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 5px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .field input, .field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.9rem;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus, .field textarea:focus {
    border-color: var(--accent);
  }

  .field textarea {
    font-family: var(--sans);
    resize: none;
    height: 60px;
    font-size: 0.85rem;
  }

  .entry-actions {
    display: flex;
    gap: 8px;
    margin-top: 4px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 9px 18px;
    border-radius: 7px;
    border: none;
    font-family: var(--sans);
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn:active { transform: scale(0.97); }
  .btn-save   { background: var(--accent); color: #fff; }
  .btn-delete { background: transparent; border: 1px solid var(--loss); color: var(--loss); }
  .btn-close  { background: transparent; border: 1px solid var(--border); color: var(--text-dim); margin-left: auto; }
  .btn:hover  { opacity: 0.85; }

  /* ─── Monthly Report ─── */
  .report-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .report-header {
    background: var(--surface2);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .report-header h2 {
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--text);
  }

  .btn-print {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 6px 14px;
    font-family: var(--sans);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
  }

  .report-table-wrap {
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  thead th {
    background: var(--surface2);
    color: var(--text-dim);
    font-weight: 600;
    font-size: 0.72rem;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:hover { background: var(--surface2); }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 9px 14px;
    color: var(--text);
    vertical-align: top;
  }

  td.mono { font-family: var(--mono); font-size: 0.82rem; }
  td.pos  { color: var(--profit); font-family: var(--mono); font-weight: 600; }
  td.neg  { color: var(--loss);   font-family: var(--mono); font-weight: 600; }

  .report-foot td {
    background: var(--surface2);
    font-weight: 700;
    border-top: 2px solid var(--border) !important;
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  .report-foot td.pos { color: var(--profit); }
  .report-foot td.neg { color: var(--loss); }

  .empty-report {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 20px;
    font-size: 0.85rem;
  }

  /* ─── Print ─── */
  @media print {
    body { background: #fff; color: #000; padding: 0; }
    .nav-bar, .entry-panel, .btn-print, .app-header > .nav-bar { display: none !important; }
    .summary-bar { display: grid !important; }
    .summary-card { border: 1px solid #ccc; background: #f9f9f9; }
    .summary-card .label { color: #555; }
    .summary-card .value { color: #000 !important; }
    .calendar-wrap { display: none; }
    .report-section { border: 1px solid #ccc; }
    .report-header { background: #f0f0f0; }
    thead th { background: #f0f0f0; color: #333; }
    .report-foot td { background: #f0f0f0; }
    td, th { border: 1px solid #ddd; }
  }

  @media (max-width: 600px) {
    body { padding: 12px; }
    .entry-row { grid-template-columns: 1fr; }
    .cal-cell { min-height: 56px; padding: 4px; }
    .day-note { display: none; }
    .summary-bar { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<div class="app-header">
  <div class="app-title">📊 บันทึก<span>กำไร/ขาดทุน</span></div>
  <div class="nav-bar">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>
</div>

<!-- Summary -->
<div class="summary-bar">
  <div class="summary-card profit-card">
    <div class="label">กำไรรวม</div>
    <div class="value" id="sumProfit">฿0</div>
  </div>
  <div class="summary-card loss-card">
    <div class="label">ขาดทุนรวม</div>
    <div class="value" id="sumLoss">฿0</div>
  </div>
  <div class="summary-card net-card">
    <div class="label">สุทธิ</div>
    <div class="value zero" id="sumNet">฿0</div>
  </div>
  <div class="summary-card days-card">
    <div class="label">วันที่บันทึก</div>
    <div class="value" id="sumDays">0 วัน</div>
  </div>
</div>

<!-- Calendar -->
<div class="calendar-wrap">
  <div class="cal-head">
    <div class="cal-head-cell">อา</div>
    <div class="cal-head-cell">จ</div>
    <div class="cal-head-cell">อ</div>
    <div class="cal-head-cell">พ</div>
    <div class="cal-head-cell">พฤ</div>
    <div class="cal-head-cell">ศ</div>
    <div class="cal-head-cell">ส</div>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- Entry Panel -->
<div class="entry-panel" id="entryPanel">
  <div class="entry-title">✏️ บันทึกวันที่ <strong id="entryDateLabel"></strong></div>
  <div class="entry-row">
    <div class="field">
      <label>กำไร (บาท)</label>
      <input type="number" id="inputProfit" placeholder="0" min="0" step="0.01">
    </div>
    <div class="field">
      <label>ขาดทุน (บาท)</label>
      <input type="number" id="inputLoss" placeholder="0" min="0" step="0.01">
    </div>
  </div>
  <div class="field" style="margin-bottom:12px">
    <label>หมายเหตุ</label>
    <textarea id="inputNote" placeholder="เพิ่มหมายเหตุ..."></textarea>
  </div>
  <div class="entry-actions">
    <button class="btn btn-save" onclick="saveEntry()">💾 บันทึก</button>
    <button class="btn btn-delete" onclick="deleteEntry()">🗑 ลบ</button>
    <button class="btn btn-close" onclick="closePanel()">✕ ปิด</button>
  </div>
</div>

<!-- Report -->
<div class="report-section">
  <div class="report-header">
    <h2 id="reportTitle">รายงานประจำเดือน</h2>
    <button class="btn-print" onclick="window.print()">🖨️ พิมพ์รายงาน</button>
  </div>
  <div class="report-table-wrap">
    <div id="reportBody"></div>
  </div>
</div>

<script>
  const MONTHS_TH = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
                     'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const DAYS_TH   = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];

  let today      = new Date();
  let curYear    = today.getFullYear();
  let curMonth   = today.getMonth(); // 0-based
  let selectedKey = null;

  // ─── Storage ───────────────────────────────────────────────────
  function storageKey(year, month) { return `plcal_${year}_${month}`; }

  function loadData(year, month) {
    try { return JSON.parse(localStorage.getItem(storageKey(year, month))) || {}; }
    catch { return {}; }
  }

  function saveData(year, month, data) {
    localStorage.setItem(storageKey(year, month), JSON.stringify(data));
  }

  // ─── Format ────────────────────────────────────────────────────
  function fmt(n) {
    return '฿' + Math.abs(n).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  // ─── Render ────────────────────────────────────────────────────
  function render() {
    const data = loadData(curYear, curMonth);

    // Month label
    document.getElementById('monthLabel').textContent =
      `${MONTHS_TH[curMonth]} ${curYear + 543}`;
    document.getElementById('reportTitle').textContent =
      `รายงานประจำเดือน${MONTHS_TH[curMonth]} ${curYear + 543}`;

    // Summary
    let totalProfit = 0, totalLoss = 0, days = 0;
    Object.values(data).forEach(d => {
      if (d.profit || d.loss) days++;
      totalProfit += parseFloat(d.profit || 0);
      totalLoss   += parseFloat(d.loss   || 0);
    });
    const net = totalProfit - totalLoss;

    document.getElementById('sumProfit').textContent = fmt(totalProfit);
    document.getElementById('sumLoss').textContent   = fmt(totalLoss);

    const netEl = document.getElementById('sumNet');
    netEl.textContent  = (net >= 0 ? '+' : '-') + fmt(net);
    netEl.className    = 'value ' + (net > 0 ? 'pos' : net < 0 ? 'neg' : 'zero');
    document.getElementById('sumDays').textContent = `${days} วัน`;

    // Calendar
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    const firstDay = new Date(curYear, curMonth, 1).getDay();
    const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();

    // Empty cells
    for (let i = 0; i < firstDay; i++) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell empty';
      grid.appendChild(cell);
    }

    // Day cells
    for (let d = 1; d <= daysInMonth; d++) {
      const key   = `${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const entry = data[key] || {};
      const p     = parseFloat(entry.profit || 0);
      const l     = parseFloat(entry.loss   || 0);
      const dow   = new Date(curYear, curMonth, d).getDay();
      const isToday = curYear === today.getFullYear() && curMonth === today.getMonth() && d === today.getDate();

      let cls = 'cal-cell';
      if (dow === 0) cls += ' day-sunday';
      if (dow === 6) cls += ' day-saturday';
      if (isToday)   cls += ' today';
      if (p > 0 && l === 0) cls += ' has-profit';
      if (l > 0 && p === 0) cls += ' has-loss';
      if (key === selectedKey) cls += ' selected';

      const cell = document.createElement('div');
      cell.className = cls;
      cell.dataset.key = key;
      cell.dataset.day = d;
      cell.onclick = () => openEntry(key, d);

      const dayNum = document.createElement('div');
      dayNum.className = 'day-num';
      dayNum.textContent = d;
      cell.appendChild(dayNum);

      if (entry.note) {
        const note = document.createElement('div');
        note.className = 'day-note';
        note.textContent = entry.note;
        cell.appendChild(note);
      }

      if (p !== 0 || l !== 0) {
        const net2 = p - l;
        const amt = document.createElement('div');
        amt.className = 'day-amount ' + (net2 >= 0 ? 'pos' : 'neg');
        amt.textContent = (net2 >= 0 ? '+' : '-') + fmt(net2);
        cell.appendChild(amt);
      }

      grid.appendChild(cell);
    }

    renderReport(data);
  }

  // ─── Report table ──────────────────────────────────────────────
  function renderReport(data) {
    const entries = Object.entries(data)
      .filter(([,v]) => v.profit || v.loss || v.note)
      .sort(([a],[b]) => a < b ? -1 : 1);

    const wrap = document.getElementById('reportBody');
    if (!entries.length) {
      wrap.innerHTML = '<div class="empty-report">ยังไม่มีข้อมูลในเดือนนี้</div>';
      return;
    }

    let totalP = 0, totalL = 0;
    let rows = '';
    entries.forEach(([key, v]) => {
      const p   = parseFloat(v.profit || 0);
      const l   = parseFloat(v.loss   || 0);
      const net = p - l;
      totalP += p; totalL += l;
      const [,, dd] = key.split('-');
      const dow = new Date(key).getDay();
      rows += `<tr>
        <td class="mono">${parseInt(dd)} ${MONTHS_TH[curMonth]}</td>
        <td class="mono">${DAYS_TH[dow]}</td>
        <td class="${p > 0 ? 'pos' : 'mono'}">${p > 0 ? fmt(p) : '-'}</td>
        <td class="${l > 0 ? 'neg' : 'mono'}">${l > 0 ? fmt(l) : '-'}</td>
        <td class="${net >= 0 ? 'pos' : 'neg'}">${(net >= 0 ? '+' : '-') + fmt(net)}</td>
        <td style="color:var(--text-dim);font-size:0.78rem">${v.note || ''}</td>
      </tr>`;
    });

    const totalNet = totalP - totalL;
    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>วันที่</th><th>วัน</th><th>กำไร</th><th>ขาดทุน</th><th>สุทธิ</th><th>หมายเหตุ</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
        <tfoot class="report-foot">
          <tr>
            <td colspan="2">รวมทั้งเดือน</td>
            <td class="pos">${fmt(totalP)}</td>
            <td class="neg">${fmt(totalL)}</td>
            <td class="${totalNet >= 0 ? 'pos' : 'neg'}">${(totalNet >= 0 ? '+' : '-') + fmt(totalNet)}</td>
            <td></td>
          </tr>
        </tfoot>
      </table>`;
  }

  // ─── Entry Panel ───────────────────────────────────────────────
  function openEntry(key, day) {
    selectedKey = key;
    const data  = loadData(curYear, curMonth);
    const entry = data[key] || {};

    document.getElementById('entryPanel').classList.add('open');
    const [y, m, d2] = key.split('-');
    const dow = new Date(key).getDay();
    document.getElementById('entryDateLabel').textContent =
      `${parseInt(d2)} ${MONTHS_TH[curMonth]} ${curYear + 543} (${DAYS_TH[dow]})`;
    document.getElementById('inputProfit').value = entry.profit || '';
    document.getElementById('inputLoss').value   = entry.loss   || '';
    document.getElementById('inputNote').value   = entry.note   || '';

    document.getElementById('entryPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    render();
  }

  function closePanel() {
    selectedKey = null;
    document.getElementById('entryPanel').classList.remove('open');
    render();
  }

  function saveEntry() {
    if (!selectedKey) return;
    const data  = loadData(curYear, curMonth);
    const p = parseFloat(document.getElementById('inputProfit').value) || 0;
    const l = parseFloat(document.getElementById('inputLoss').value)   || 0;
    const n = document.getElementById('inputNote').value.trim();

    if (p === 0 && l === 0 && !n) {
      delete data[selectedKey];
    } else {
      data[selectedKey] = { profit: p || 0, loss: l || 0, note: n };
    }

    saveData(curYear, curMonth, data);
    render();

    // Flash feedback
    const btn = document.querySelector('.btn-save');
    btn.textContent = '✓ บันทึกแล้ว';
    setTimeout(() => btn.textContent = '💾 บันทึก', 1200);
  }

  function deleteEntry() {
    if (!selectedKey) return;
    if (!confirm('ลบข้อมูลวันนี้?')) return;
    const data = loadData(curYear, curMonth);
    delete data[selectedKey];
    saveData(curYear, curMonth, data);
    closePanel();
  }

  // ─── Navigation ────────────────────────────────────────────────
  function changeMonth(dir) {
    curMonth += dir;
    if (curMonth > 11) { curMonth = 0; curYear++; }
    if (curMonth < 0)  { curMonth = 11; curYear--; }
    selectedKey = null;
    document.getElementById('entryPanel').classList.remove('open');
    render();
  }

  // ─── Init ──────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
